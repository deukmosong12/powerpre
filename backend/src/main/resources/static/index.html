<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>전력 수요 예측</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #222; }

    .header {
      background: #1a1a2e;
      color: #fff;
      padding: 18px 32px;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .container { max-width: 900px; margin: 32px auto; padding: 0 20px; }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 24px 28px;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .card h2 {
      font-size: 15px;
      font-weight: 600;
      color: #444;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
    }

    .form-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }

    input[type="text"], input[type="file"] {
      flex: 1;
      padding: 9px 13px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      min-width: 160px;
    }

    input[type="file"] { padding: 7px 10px; }

    button {
      padding: 9px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
